 <script>

let recognition;
let allText = "";

// Start Speech Function
function startSpeech() {

    // Browser Support Check
    if (!('webkitSpeechRecognition' in window)) {

        alert(
            "Speech Recognition not supported in this browser"
        );

        return;
    }

    recognition =
        new webkitSpeechRecognition();

    // Continuous Listening
    recognition.continuous = true;

    // Only Final Result
    recognition.interimResults = false;

    // Language
    recognition.lang = "en-US";

    // Better Accuracy
    recognition.maxAlternatives = 1;

    // Mic ON
    document.getElementById("mic-status")
        .innerHTML = "🟢 Listening...";

    document.getElementById("mic-status")
        .style.color = "green";

    document.getElementById("status")
        .innerHTML = "Speak now...";

    // Speech Result
    recognition.onresult = function(event) {

        let currentText = "";

        for(let i = event.resultIndex;
            i < event.results.length;
            i++) {

            currentText +=
                event.results[i][0]
                .transcript + " ";
        }

        // Store complete speech
        allText += currentText;

        // Display all text continuously
        document.getElementById("output")
            .innerHTML = allText;

        // Auto Scroll
        document.getElementById("output-box")
            .scrollTop =
            document.getElementById("output-box")
            .scrollHeight;
    };

    // Error Handling
    recognition.onerror = function(event) {

        document.getElementById("output")
            .innerHTML +=
            "<div class='error'>Could not understand audio</div>";
    };

    // Auto Restart Recognition
    recognition.onend = function() {

        document.getElementById("mic-status")
            .innerHTML = "🔴 Mic OFF";

        document.getElementById("mic-status")
            .style.color = "red";

        document.getElementById("status")
            .innerHTML =
            "Speech recognition stopped";

        // Restart automatically
        recognition.start();
    };

    // Start Recognition
    recognition.start();
}

// Stop Function
function stopSpeech() {

    if(recognition){

        recognition.onend = null;

        recognition.stop();

        document.getElementById("mic-status")
            .innerHTML = "🔴 Mic OFF";

        document.getElementById("mic-status")
            .style.color = "red";

        document.getElementById("status")
            .innerHTML =
            "Listening stopped";
    }
}
//download button
function downloadText(){

    let blob =
        new Blob([allText],
        {type:"text/plain"});

    let a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        "speech.txt";

    a.click();
}
</script>
